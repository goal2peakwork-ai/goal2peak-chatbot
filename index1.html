<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal2Peak Lead Chatbot</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --primary: #00c896;
    --primary-dark: #00a87e;
    --dark: #0a0a0f;
    --dark2: #13131a;
    --dark3: #1c1c26;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: #8888aa;
    --bubble-bot: #1c1c26;
    --bubble-user: #00c896;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: var(--text);
  }

  /* Demo page background */
  .demo-bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0a0a0f 0%, #0d1117 50%, #0a0f0a 100%);
    z-index: 0;
  }
  .demo-bg::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,200,150,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }
  .demo-label {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 1;
  }
  .demo-label span { color: var(--primary); }

  /* ── CHAT BUBBLE TRIGGER ── */
  #chat-trigger {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 4px 24px rgba(0,200,150,0.4);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    border: none;
    outline: none;
  }
  #chat-trigger:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 32px rgba(0,200,150,0.55);
  }
  #chat-trigger svg { width: 26px; height: 26px; fill: white; transition: opacity 0.2s; }
  #chat-trigger .icon-close { display: none; }

  .pulse-ring {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid rgba(0,200,150,0.4);
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* ── CHAT WINDOW ── */
  #chat-window {
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 360px;
    max-height: 560px;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    z-index: 9998;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,200,150,0.1);
    transform: scale(0.85) translateY(20px);
    opacity: 0;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    overflow: hidden;
  }
  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, #0d1a15, #0a1410);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: white;
    flex-shrink: 0;
  }
  .chat-header-info { flex: 1; }
  .chat-header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }
  .chat-header-status {
    font-size: 12px;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--primary);
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Messages */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    animation: msgIn 0.3s ease forwards;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.bot { align-items: flex-start; }
  .msg.user { align-items: flex-end; }

  .bubble {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    font-family: 'DM Sans', sans-serif;
  }
  .msg.bot .bubble {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border-bottom-right-radius: 4px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
    animation: msgIn 0.3s ease forwards;
  }
  .opt-btn {
    background: transparent;
    border: 1px solid rgba(0,200,150,0.3);
    color: var(--primary);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .opt-btn:hover {
    background: rgba(0,200,150,0.1);
    border-color: var(--primary);
    transform: translateX(3px);
  }
  .opt-btn .opt-icon { font-size: 16px; }

  /* Input area */
  .chat-input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    background: var(--dark2);
  }
  .chat-input {
    flex: 1;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: rgba(0,200,150,0.4); }
  .chat-input::placeholder { color: var(--muted); }
  .chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.2s, opacity 0.2s;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Success state */
  .success-card {
    background: linear-gradient(135deg, rgba(0,200,150,0.1), rgba(0,168,126,0.05));
    border: 1px solid rgba(0,200,150,0.3);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    animation: msgIn 0.4s ease forwards;
  }
  .success-icon { font-size: 32px; margin-bottom: 10px; }
  .success-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--primary);
    margin-bottom: 6px;
  }
  .success-text { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* Powered by */
  .powered-by {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .powered-by span { color: var(--primary); font-weight: 600; }

  @media (max-width: 420px) {
    #chat-window { width: calc(100vw - 32px); right: 16px; }
    #chat-trigger { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<div class="demo-bg"></div>
<div class="demo-label">Goal2Peak <span>·</span> Lead Chatbot Widget</div>

<!-- TRIGGER BUTTON -->
<button id="chat-trigger" onclick="toggleChat()" aria-label="Open chat">
  <div class="pulse-ring"></div>
  <svg class="icon-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
  <svg class="icon-close" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
</button>

<!-- CHAT WINDOW -->
<div id="chat-window">
  <div class="chat-header">
    <div class="chat-avatar">G2</div>
    <div class="chat-header-info">
      <div class="chat-header-name">Goal2Peak</div>
      <div class="chat-header-status"><div class="status-dot"></div> Online · Typically replies instantly</div>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="chat-input-area">
    <input type="text" class="chat-input" id="chat-input" placeholder="Type your answer..." disabled onkeydown="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered-by">Powered by <span>Goal2Peak</span></div>
</div>

<script>
  emailjs.init("LQxI8pWKWNCt0pk67");

  const SERVICE_ID = "service_w47qheg";
  const TEMPLATE_ID = "template_ioe75w7";

  let chatOpen = false;
  let step = 0;
  let userData = { name: '', email: '', phone: '', business_type: '', budget: '' };
  let awaitingInput = false;
  let started = false;

  function toggleChat() {
    chatOpen = !chatOpen;
    const win = document.getElementById('chat-window');
    const trigger = document.getElementById('chat-trigger');
    win.classList.toggle('open', chatOpen);
    trigger.querySelector('.icon-chat').style.display = chatOpen ? 'none' : 'block';
    trigger.querySelector('.icon-close').style.display = chatOpen ? 'block' : 'none';
    if (chatOpen && !started) { started = true; setTimeout(startChat, 400); }
  }

  function addMsg(text, type='bot') {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function botSay(text, delay=800) {
    return new Promise(resolve => {
      showTyping();
      setTimeout(() => {
        removeTyping();
        addMsg(text);
        resolve();
      }, delay);
    });
  }

  function showOptions(options) {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'options';
    div.id = 'options-container';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span class="opt-icon">${opt.icon}</span>${opt.label}`;
      btn.onclick = () => optionSelected(opt.value, opt.label, div);
      div.appendChild(btn);
    });
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeOptions() {
    const o = document.getElementById('options-container');
    if (o) o.remove();
  }

  function enableInput(placeholder='Type your answer...') {
    const inp = document.getElementById('chat-input');
    const btn = document.getElementById('send-btn');
    inp.disabled = false;
    btn.disabled = false;
    inp.placeholder = placeholder;
    inp.focus();
    awaitingInput = true;
  }

  function disableInput() {
    const inp = document.getElementById('chat-input');
    const btn = document.getElementById('send-btn');
    inp.disabled = true;
    btn.disabled = true;
    awaitingInput = false;
  }

  async function startChat() {
    await botSay("👋 Hey there! Welcome to <strong>Goal2Peak</strong>.", 800);
    await botSay("We help businesses grow with Meta Ads, Google Ads & content strategy.", 1000);
    await botSay("Let me get you a <strong>free strategy</strong> in 60 seconds. What's your business type? 👇", 1000);
    showOptions([
      { icon: '💇', label: 'Salon / Beauty Parlour', value: 'Salon/Beauty' },
      { icon: '🏋️', label: 'Gym / Fitness Centre', value: 'Gym/Fitness' },
      { icon: '🏥', label: 'Clinic / Doctor', value: 'Clinic/Doctor' },
      { icon: '🍽️', label: 'Restaurant / Cafe', value: 'Restaurant/Cafe' },
      { icon: '🏠', label: 'Real Estate', value: 'Real Estate' },
      { icon: '🛒', label: 'E-commerce / D2C', value: 'E-commerce/D2C' },
      { icon: '💼', label: 'Other Business', value: 'Other' },
    ]);
    step = 1;
  }

  async function optionSelected(value, label, container) {
    container.remove();
    addMsg(label, 'user');

    if (step === 1) {
      userData.business_type = value;
      await botSay(`Great choice! 🎯 What's your monthly marketing budget?`, 900);
      showOptions([
        { icon: '💰', label: 'Under $500 / month', value: 'Under $500' },
        { icon: '💵', label: '$500 - $1,000 / month', value: '$500-$1000' },
        { icon: '💎', label: '$1,000+ / month', value: '$1000+' },
        { icon: '🤔', label: "I'm not sure yet", value: 'Not sure' },
      ]);
      step = 2;
    } else if (step === 2) {
      userData.budget = value;
      await botSay(`Perfect! Now let me grab your details so Kartik can send your free strategy. 📋`, 900);
      await botSay(`What's your <strong>full name</strong>?`, 700);
      enableInput('Your full name...');
      step = 3;
    }
  }

  async function sendMessage() {
    if (!awaitingInput) return;
    const inp = document.getElementById('chat-input');
    const val = inp.value.trim();
    if (!val) return;
    inp.value = '';
    disableInput();
    addMsg(val, 'user');

    if (step === 3) {
      userData.name = val;
      await botSay(`Nice to meet you, <strong>${val}</strong>! 👋`, 800);
      await botSay(`What's your <strong>email address</strong>?`, 700);
      enableInput('your@email.com');
      step = 4;
    } else if (step === 4) {
      if (!val.includes('@')) {
        addMsg('Please enter a valid email address.', 'bot');
        enableInput('your@email.com');
        return;
      }
      userData.email = val;
      await botSay(`Got it! Last one — your <strong>WhatsApp / phone number</strong>?`, 800);
      enableInput('+1 234 567 8900');
      step = 5;
    } else if (step === 5) {
      userData.phone = val;
      await botSay(`🚀 All set! Sending your details to Kartik now...`, 700);
      submitLead();
    }
  }

  async function submitLead() {
    try {
      await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
        name: userData.name,
        email: userData.email,
        phone: userData.phone,
        business_type: userData.business_type,
        budget: userData.budget,
      });
      showSuccess();
    } catch (err) {
      addMsg("Hmm, something went wrong. Please email us directly at goal2peak.work@gmail.com", 'bot');
    }
  }

  function showSuccess() {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'success-card';
    div.innerHTML = `
      <div class="success-icon">🎉</div>
      <div class="success-title">You're all set, ${userData.name}!</div>
      <div class="success-text">Kartik will reach out within <strong>24 hours</strong> with a free custom strategy for your ${userData.business_type} business.<br><br>Check your email at <strong>${userData.email}</strong> for confirmation.</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;

    const inputArea = document.querySelector('.chat-input-area');
    inputArea.innerHTML = `<div style="width:100%;text-align:center;font-size:13px;color:var(--muted);padding:4px 0;">We'll be in touch soon! 👋</div>`;
  }
</script>
</body>
</html>
